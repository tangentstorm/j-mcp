name: build

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Opt JS actions (checkout, upload-artifact, ...) onto Node 24 ahead of the
  # June 2026 deprecation. Remove once the actions we use ship natively on 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: make
      - name: rename artifact
        run: mv build/j-mcp build/j-mcp-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-linux-x86_64
          path: build/j-mcp-linux-x86_64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: make
      - name: rename artifact
        run: mv build/j-mcp build/j-mcp-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-macos-arm64
          path: build/j-mcp-macos-arm64

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update:  false
          install: >-
            make
            mingw-w64-x86_64-gcc
      - name: build
        run: make
      - name: rename artifact
        run: mv build/j-mcp.exe build/j-mcp-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-windows-x86_64
          path: build/j-mcp-windows-x86_64.exe

  # Assemble the DXT/MCPB bundle (.mcpb file, also emitted as .dxt for
  # backwards compatibility with older Claude Desktop releases). Runs on
  # every PR so the packaging itself is always proved green; only uploaded
  # to a GitHub release when a v* tag is pushed.
  bundle:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: assemble bundle
        run: |
          set -eu
          mkdir -p pkg/bin/linux pkg/bin/darwin pkg/bin/win32
          cp dist/j-mcp-linux-x86_64        pkg/bin/linux/j-mcp
          cp dist/j-mcp-macos-arm64         pkg/bin/darwin/j-mcp
          cp dist/j-mcp-windows-x86_64.exe  pkg/bin/win32/j-mcp.exe
          chmod +x pkg/bin/linux/j-mcp pkg/bin/darwin/j-mcp
          cp manifest.json pkg/manifest.json
          cp README.md     pkg/README.md
          cp LICENSE       pkg/LICENSE
          (cd pkg && zip -qr ../j-mcp.mcpb .)
          cp j-mcp.mcpb j-mcp.dxt
          ls -la j-mcp.mcpb j-mcp.dxt
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-bundle
          path: |
            j-mcp.mcpb
            j-mcp.dxt

  release:
    needs: [bundle]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
