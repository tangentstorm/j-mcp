name: build

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: make
      - name: rename artifact
        run: mv build/j-mcp build/j-mcp-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-linux-x86_64
          path: build/j-mcp-linux-x86_64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: make
      - name: rename artifact
        run: mv build/j-mcp build/j-mcp-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-macos-arm64
          path: build/j-mcp-macos-arm64

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update:  false
          install: >-
            make
            mingw-w64-x86_64-gcc
      - name: build
        run: make
      - name: rename artifact
        run: mv build/j-mcp.exe build/j-mcp-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: j-mcp-windows-x86_64
          path: build/j-mcp-windows-x86_64.exe

  release:
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
